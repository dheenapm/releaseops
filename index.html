<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GridFlowOps — Utility Release Intelligence Control Plane</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
:root{
  --bg:#050a09;
  --panel:#0c1513;
  --panel2:#0f1d1a;
  --border:#1b3a33;
  --text:#e6f2ef;
  --muted:#6f9a92;
  --accent:#00e5b0;
  --accent2:#00b88c;
  --warn:#f59e0b;
  --danger:#ef4444;
  --mono:'IBM Plex Mono',monospace;
  --body:'IBM Plex Sans',sans-serif;
  --display:'Rajdhani',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(circle at top,#0b1513,#040707);
  color:var(--text);
  font-family:var(--body);
  overflow:hidden;
}

/* TOPBAR */
.topbar{
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:var(--display);
  font-size:20px;
  letter-spacing:2px;
  color:var(--accent);
}
.subtitle{
  font-size:11px;
  font-family:var(--mono);
  color:var(--muted);
}

/* MAIN */
.container{
  display:grid;
  grid-template-columns:1fr;
  height:calc(100vh - 56px);
}

/* ARCHITECTURE LAYER */
.architecture{
  position:relative;
  height:100%;
}

#network{
  height:100%;
  width:100%;
}

/* FLOATING PANEL */
.panel{
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  z-index:10;
}
.panel h3{
  font-family:var(--display);
  color:var(--accent);
  margin-bottom:10px;
}
.card{
  padding:8px;
  border:1px solid var(--border);
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.card:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
}
.card small{
  color:var(--muted);
}

/* PLUS BUTTONS */
.plus{
  width:20px;
  height:20px;
  border-radius:50%;
  background:var(--accent);
  color:#041a15;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  position:absolute;
  box-shadow:0 0 12px rgba(0,229,176,0.4);
  transition:0.2s;
}
.plus:hover{
  transform:scale(1.2);
}

</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">GRIDFLOWOPS</div>
    <div class="subtitle">Utility Enterprise Release Intelligence Control Plane</div>
  </div>
</div>

<div class="container">

<div class="architecture">
  <div id="network"></div>

  <div class="panel">
    <h3>Release Actions</h3>
    <div class="card" onclick="createRelease('Generation')">
      Generation <small>Click to create release</small>
    </div>
    <div class="card" onclick="createRelease('Transmission')">
      Transmission <small>Click to create release</small>
    </div>
    <div class="card" onclick="createRelease('Distribution')">
      Distribution <small>Click to create release</small>
    </div>
    <div class="card" onclick="createRelease('Billing')">
      Billing <small>Click to create release</small>
    </div>
  </div>

</div>

</div>

<script>

function createRelease(domain){
  alert("Create Release triggered for: " + domain + "\nYou can now add apps, integrations, systems.");
}

const nodes = new vis.DataSet([
  { id: 1, label: "Generation", color:'#00e5b0' },
  { id: 2, label: "Transmission", color:'#38bdf8' },
  { id: 3, label: "Distribution", color:'#a78bfa' },
  { id: 4, label: "Billing", color:'#fb7185' },
  { id: 5, label: "Customer Care", color:'#f59e0b' },

  { id: 6, label: "SCADA" },
  { id: 7, label: "Grid Control" },
  { id: 8, label: "OMS" },
  { id: 9, label: "CRM" },
  { id: 10, label: "Metering" }
]);

const edges = new vis.DataSet([
  { from:1,to:6 },
  { from:6,to:7 },
  { from:7,to:2 },
  { from:2,to:8 },
  { from:8,to:3 },
  { from:3,to:10 },
  { from:10,to:4 },
  { from:4,to:9 },
  { from:9,to:5 }
]);

const container = document.getElementById("network");

const data = { nodes, edges };

const options = {
  nodes:{
    shape:"dot",
    size:18,
    font:{color:"#e6f2ef"},
    borderWidth:1
  },
  edges:{color:"#1f3b36"},
  physics:{stabilization:false}
};

const network = new vis.Network(container, data, options);

// Add click interaction
network.on("click", function(params){
  if(params.nodes.length){
    alert("Selected system: " + nodes.get(params.nodes[0]).label);
  }
});

</script>

</body>
</html>
